<html>
    <head>
        <meta charset="utf-8">

        <title>Volatile v0.0.2</title>

        <script src="/ponyfill.min.js"></script>
        <script src="/StreamSaver.min.js"></script>
        <script type="module" src="./index-0.0.2.js"></script>

        <style>
            * {
                box-sizing: border-box;
                margin: 0;
                padding: 0;
            }

            #dropping_area {
                width: 300px;
                height: 200px;
                padding: 1em;
                background-color: black;
                color: white;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
            }

            #dropping_area > p {
                margin-bottom: 1em;
            }
        </style>
    </head>

    <body>
        <div id="dropping_area">
            <p>将文件或文件夹拖拽至此</p>
            <p>文件数量过多会导致界面假死，请耐心等候（3000文件会假死2秒左右）</p>
        </div>

        <div id="status">
            0
        </div>

        <div>
            <button id="compress_encrypt">压缩并加密</button>
            <button id="decrypt">解密</button>
        </div>
    </body>
</html>
